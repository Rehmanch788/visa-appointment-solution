<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qatar Visa Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #c8a96e;
    --accent2: #7c6fcd;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --success: #4ade80;
    --error: #f87171;
    --warning: #fbbf24;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
 
  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(200,169,110,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,169,110,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
 
  .glow-orb {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,111,205,0.08) 0%, transparent 70%);
    top: -200px;
    right: -200px;
    pointer-events: none;
    z-index: 0;
  }
 
  .glow-orb2 {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,169,110,0.06) 0%, transparent 70%);
    bottom: -100px;
    left: -100px;
    pointer-events: none;
    z-index: 0;
  }
 
  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 60px 24px;
    position: relative;
    z-index: 1;
  }
 
  /* Header */
  .header {
    margin-bottom: 52px;
    animation: fadeDown 0.6s ease forwards;
  }
 
  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
 
  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
 
  .badge {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent);
    border: 1px solid rgba(200,169,110,0.3);
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }
 
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 38px;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--text) 60%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 10px;
  }
 
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.05em;
  }
 
  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease 0.1s both;
  }
 
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
 
  .status-dot.active { 
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    animation: pulse 2s infinite;
  }
 
  .status-dot.error { background: var(--error); }
 
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
 
  .status-text {
    font-size: 12px;
    color: var(--muted);
    flex: 1;
  }
 
  .status-text span { color: var(--text); }
 
  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s ease both;
    transition: border-color 0.3s;
  }
 
  .card:hover { border-color: rgba(200,169,110,0.2); }
  .card:nth-child(1) { animation-delay: 0.15s; }
  .card:nth-child(2) { animation-delay: 0.25s; }
  .card:nth-child(3) { animation-delay: 0.35s; }
 
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
  }
 
  .card-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
  }
 
  .card-icon.gold { background: rgba(200,169,110,0.12); }
  .card-icon.purple { background: rgba(124,111,205,0.12); }
  .card-icon.green { background: rgba(74,222,128,0.08); }
 
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }
 
  .card-subtitle {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }
 
  /* Form fields */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
 
  .form-grid.single { grid-template-columns: 1fr; }
 
  .field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
 
  label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
 
  input, select {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    transition: all 0.2s;
    outline: none;
    width: 100%;
  }
 
  input:focus, select:focus {
    border-color: rgba(200,169,110,0.5);
    background: rgba(200,169,110,0.03);
    box-shadow: 0 0 0 3px rgba(200,169,110,0.06);
  }
 
  input::placeholder { color: var(--muted); }
 
  select option { background: #1a1a2e; }
 
  /* Interval selector */
  .interval-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
 
  .interval-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
 
  .interval-btn:hover {
    border-color: rgba(200,169,110,0.3);
    color: var(--text);
  }
 
  .interval-btn.selected {
    background: rgba(200,169,110,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }
 
  /* Submit button */
  .btn-primary {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), #b8954a);
    border: none;
    border-radius: 10px;
    color: #0a0a0f;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }
 
  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
 
  .btn-primary:hover::before { opacity: 1; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(200,169,110,0.25); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
 
  .btn-stop {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 10px;
    color: var(--error);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    display: none;
  }
 
  .btn-stop:hover { background: rgba(248,113,113,0.08); }
 
  /* Log terminal */
  .terminal {
    background: #080810;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    height: 200px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.8;
  }
 
  .terminal::-webkit-scrollbar { width: 4px; }
  .terminal::-webkit-scrollbar-track { background: transparent; }
  .terminal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
 
  .log-line { display: flex; gap: 12px; }
  .log-time { color: var(--muted); flex-shrink: 0; }
  .log-msg { color: var(--text); }
  .log-msg.success { color: var(--success); }
  .log-msg.error { color: var(--error); }
  .log-msg.warning { color: var(--warning); }
  .log-msg.info { color: var(--accent2); }
 
  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }
 
  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
 
  /* Alert banner */
  .alert {
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
    animation: fadeUp 0.3s ease;
  }
 
  .alert.success { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); color: var(--success); }
  .alert.error { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); color: var(--error); }
 
  /* Responsive */
  @media (max-width: 500px) {
    .form-grid { grid-template-columns: 1fr; }
    .interval-grid { grid-template-columns: repeat(2, 1fr); }
    h1 { font-size: 28px; }
  }
</style>
</head>
<body>
 
<div class="glow-orb"></div>
<div class="glow-orb2"></div>
 
<div class="container">
 
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo-icon">🛂</div>
      <span class="badge">Live Monitor</span>
    </div>
    <h1>Qatar Visa<br>Appointment Bot</h1>
    <p class="subtitle">// Islamabad Center — Auto Detection System</p>
  </div>
 
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Status: <span>Idle — Enter details to begin</span></span>
    <span style="font-size:11px; color:var(--muted)" id="checkCount"></span>
  </div>
 
  <!-- Alert -->
  <div class="alert" id="alertBox"></div>
 
  <!-- Card 1: Applicant Details -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon gold">🪪</div>
      <span class="card-title">Applicant Details</span>
    </div>
    <div class="form-grid">
      <div class="field">
        <label>Passport Number</label>
        <input type="text" id="passportNumber" placeholder="AB1234567" autocomplete="off">
      </div>
      <div class="field">
        <label>Visa Number</label>
        <input type="text" id="visaNumber" placeholder="V-9876543" autocomplete="off">
      </div>
      <div class="field">
        <label>Phone Number</label>
        <input type="text" id="phoneNumber" placeholder="00923001234567">
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="emailAddress" placeholder="you@example.com">
      </div>
    </div>
  </div>
 
  <!-- Card 2: Notification -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon purple">🔔</div>
      <span class="card-title">Notification</span>
      <span class="card-subtitle">Discord Webhook</span>
    </div>
    <div class="form-grid single">
      <div class="field">
        <label>Discord Webhook URL</label>
        <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/...">
      </div>
    </div>
 
    <div class="divider"></div>
 
    <div class="card-header" style="margin-bottom:14px">
      <span style="font-size:11px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase;">Check Interval</span>
    </div>
    <div class="interval-grid">
      <button class="interval-btn selected" data-val="30000" onclick="selectInterval(this)">30 sec</button>
      <button class="interval-btn" data-val="60000" onclick="selectInterval(this)">1 min</button>
      <button class="interval-btn" data-val="300000" onclick="selectInterval(this)">5 min</button>
      <button class="interval-btn" data-val="600000" onclick="selectInterval(this)">10 min</button>
    </div>
  </div>
 
  <!-- Card 3: Controls + Logs -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon green">⚡</div>
      <span class="card-title">Control Panel</span>
    </div>
 
    <button class="btn-primary" id="startBtn" onclick="startMonitoring()">
      ▶ &nbsp; Start Monitoring
    </button>
    <button class="btn-stop" id="stopBtn" onclick="stopMonitoring()">
      ■ &nbsp; Stop Monitoring
    </button>
 
    <div class="divider"></div>
 
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <span style="font-size:11px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase;">Activity Log</span>
      <span style="font-size:11px; color:var(--muted); cursor:pointer;" onclick="clearLogs()">clear</span>
    </div>
 
    <div class="terminal" id="terminal">
      <div class="log-line">
        <span class="log-time">--:--:--</span>
        <span class="log-msg info">System ready. Waiting for input...</span>
      </div>
    </div>
  </div>
 
</div>
 
<script>
  let selectedInterval = 30000;
  let monitorInterval = null;
  let checkCount = 0;
  let isRunning = false;
 
  function selectInterval(btn) {
    document.querySelectorAll('.interval-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedInterval = parseInt(btn.dataset.val);
  }
 
  function getTime() {
    return new Date().toLocaleTimeString('en-US', { hour12: false });
  }
 
  function addLog(msg, type = '') {
    const terminal = document.getElementById('terminal');
    const line = document.createElement('div');
    line.className = 'log-line';
    line.innerHTML = `<span class="log-time">${getTime()}</span><span class="log-msg ${type}">${msg}</span>`;
    terminal.appendChild(line);
    terminal.scrollTop = terminal.scrollHeight;
  }
 
  function clearLogs() {
    document.getElementById('terminal').innerHTML = '';
  }
 
  function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    box.textContent = msg;
    box.className = `alert ${type}`;
    box.style.display = 'block';
    setTimeout(() => box.style.display = 'none', 4000);
  }
 
  function setStatus(text, dotClass = '') {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot ' + dotClass;
    document.getElementById('statusText').innerHTML = `Status: <span>${text}</span>`;
  }
 
  function validate() {
    const fields = ['passportNumber', 'visaNumber', 'phoneNumber', 'emailAddress', 'webhookUrl'];
    for (let f of fields) {
      if (!document.getElementById(f).value.trim()) {
        showAlert(`⚠️ Please fill: ${f.replace(/([A-Z])/g, ' $1')}`, 'error');
        document.getElementById(f).focus();
        return false;
      }
    }
    return true;
  }
 
  async function sendToServer(action, data) {
    try {
      const res = await fetch('/api/monitor', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...data })
      });
      return await res.json();
    } catch (e) {
      return { success: false, error: e.message };
    }
  }
 
  async function checkAppointment() {
    checkCount++;
    document.getElementById('checkCount').textContent = `${checkCount} checks`;
    addLog(`Running check #${checkCount}...`, 'info');
 
    const data = {
      passport: document.getElementById('passportNumber').value.trim(),
      visa: document.getElementById('visaNumber').value.trim(),
      phone: document.getElementById('phoneNumber').value.trim(),
      email: document.getElementById('emailAddress').value.trim(),
      webhook: document.getElementById('webhookUrl').value.trim()
    };
 
    const result = await sendToServer('check', data);
 
    if (result.found) {
      addLog('🚨 APPOINTMENT SLOT FOUND! Notification sent to Discord!', 'success');
      setStatus('Slot Found! Check Discord!', 'active');
      showAlert('🎉 Appointment slot found! Check your Discord!', 'success');
    } else if (result.error) {
      addLog(`Error: ${result.error}`, 'error');
      setStatus('Error occurred', 'error');
    } else {
      addLog('No slots available. Will check again...', 'warning');
    }
  }
 
  function startMonitoring() {
    if (!validate()) return;
    if (isRunning) return;
 
    isRunning = true;
    checkCount = 0;
 
    document.getElementById('startBtn').disabled = true;
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';
 
    setStatus('Monitoring active — Islamabad Center', 'active');
    addLog('▶ Monitoring started', 'success');
    const intervalLabel = selectedInterval < 60000 ? `${selectedInterval/1000} seconds` : `${selectedInterval/60000} minute(s)`;
    addLog(`Checking every ${intervalLabel}`, 'info');
 
    checkAppointment();
    monitorInterval = setInterval(checkAppointment, selectedInterval);
  }
 
  function stopMonitoring() {
    isRunning = false;
    clearInterval(monitorInterval);
    monitorInterval = null;
 
    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
 
    setStatus('Stopped', '');
    addLog('■ Monitoring stopped', 'error');
  }
</script>
</body>
</html>
```
